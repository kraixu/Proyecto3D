<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">

    <script type="module"
    src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js">
    </script>

    <style>
        body{
            margin:0;
            font-family:Arial;
        }

        h1{
            text-align:center;
        }

        model-viewer{
            width:100%;
            height:80vh;
        }
    </style>
</head>

<body>

<h1>Visualizador 3D</h1>

<model-viewer
    src="modelo.glb"
    camera-controls
    auto-rotate
    ar
    ar-modes="webxr scene-viewer quick-look">
</model-viewer>

</body>
</html>
